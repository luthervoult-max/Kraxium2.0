<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KRAXIUM BOT — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600;700;900&family=DM+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }

  body {
    background: #0a0a12;
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    -webkit-font-smoothing: antialiased;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
    position: relative;
  }

  /* ── Ambient background glows ── */
  .bg-glow {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
  }
  .bg-glow::before {
    content: '';
    position: absolute;
    top: -20%; left: -10%;
    width: 70vw; height: 70vw;
    background: radial-gradient(ellipse, rgba(139,92,246,0.12) 0%, transparent 65%);
    border-radius: 50%;
  }
  .bg-glow::after {
    content: '';
    position: absolute;
    bottom: -20%; right: -10%;
    width: 60vw; height: 60vw;
    background: radial-gradient(ellipse, rgba(0,255,136,0.07) 0%, transparent 65%);
    border-radius: 50%;
  }

  /* ── Hex grid pattern ── */
  .bg-grid {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background-image: radial-gradient(circle, rgba(139,92,246,0.12) 1px, transparent 1px);
    background-size: 32px 32px;
    opacity: 0.5;
  }

  /* ── Card ── */
  .card {
    position: relative; z-index: 10;
    width: 100%; max-width: 420px;
    background: rgba(22, 33, 62, 0.85);
    border: 1px solid rgba(139,92,246,0.2);
    border-radius: 20px;
    padding: 36px 36px 32px;
    backdrop-filter: blur(24px);
    box-shadow:
      0 0 0 1px rgba(139,92,246,0.08),
      0 24px 80px rgba(0,0,0,0.7),
      0 0 60px rgba(139,92,246,0.06);
    animation: fadeUp 0.5s ease both;
    margin: 20px;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── Logo ── */
  .logo-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 28px;
  }
  .logo-img {
    width: 220px;
    height: 220px;
    object-fit: contain;
    background: transparent;
    mix-blend-mode: normal;
    filter: drop-shadow(0 0 28px rgba(139,92,246,0.55)) drop-shadow(0 0 10px rgba(0,255,136,0.25));
    animation: float 4s ease-in-out infinite;
    margin-bottom: -4px;
  }
  @keyframes float {
    0%, 100% { transform: translateY(0px); }
    50%       { transform: translateY(-8px); }
  }

  .logo-tagline {
    font-size: 11px;
    font-weight: 500;
    color: #475569;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    margin-top: 6px;
  }

  /* ── Heading ── */
  .heading {
    font-family: 'Exo 2', sans-serif;
    font-weight: 700;
    font-size: 22px;
    color: #fff;
    text-align: center;
    margin-bottom: 6px;
    letter-spacing: -0.01em;
  }
  .sub {
    font-size: 13px;
    color: #64748b;
    text-align: center;
    margin-bottom: 28px;
  }

  /* ── Divider ── */
  .divider {
    height: 1px;
    background: rgba(255,255,255,0.06);
    margin-bottom: 28px;
  }

  /* ── Form ── */
  .field { margin-bottom: 16px; }
  .field-label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: #a78bfa;
    margin-bottom: 7px;
  }
  .input-wrap { position: relative; }
  .input-icon {
    position: absolute; left: 13px; top: 50%; transform: translateY(-50%);
    color: #475569; font-size: 14px; pointer-events: none;
  }
  input[type="text"], input[type="email"], input[type="password"] {
    width: 100%;
    background: rgba(10,10,18,0.8);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    padding: 11px 14px 11px 38px;
    font-size: 14px;
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    outline: none;
    transition: border-color 150ms, box-shadow 150ms;
  }
  input::placeholder { color: #334155; }
  input:focus {
    border-color: rgba(139,92,246,0.6);
    box-shadow: 0 0 0 3px rgba(139,92,246,0.12);
  }

  .field-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
  }
  .remember {
    display: flex; align-items: center; gap: 7px;
    font-size: 12px; color: #64748b; cursor: pointer;
  }
  .remember input[type="checkbox"] { accent-color: #8b5cf6; width: 14px; height: 14px; }
  .forgot { font-size: 12px; color: #8b5cf6; text-decoration: none; cursor: pointer; transition: color 150ms; }
  .forgot:hover { color: #a78bfa; }

  /* ── Button ── */
  .btn-login {
    width: 100%;
    padding: 13px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(135deg, #8b5cf6, #6d28d9);
    color: #fff;
    font-size: 14px;
    font-weight: 700;
    font-family: 'DM Sans', sans-serif;
    letter-spacing: 0.03em;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: all 150ms ease;
    box-shadow: 0 4px 20px rgba(139,92,246,0.35);
    margin-bottom: 14px;
  }
  .btn-login:hover {
    background: linear-gradient(135deg, #9b6ef7, #7c3aed);
    box-shadow: 0 4px 28px rgba(139,92,246,0.55);
    transform: translateY(-1px);
  }
  .btn-login:active { transform: scale(0.98); }
  .btn-login::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.06), transparent);
    transform: translateX(-100%);
    transition: transform 0.4s ease;
  }
  .btn-login:hover::after { transform: translateX(100%); }

  /* ── Google button ── */
  .btn-google {
    width: 100%;
    padding: 11px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.05);
    color: #e2e8f0;
    font-size: 13px;
    font-weight: 600;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 9px;
    transition: all 150ms ease;
  }
  .btn-google:hover {
    background: rgba(255,255,255,0.09);
    border-color: rgba(255,255,255,0.18);
  }

  /* ── Or separator ── */
  .or-sep {
    display: flex; align-items: center; gap: 10px;
    margin: 14px 0;
    font-size: 11px; color: #334155;
  }
  .or-sep::before, .or-sep::after {
    content: ''; flex: 1; height: 1px; background: rgba(255,255,255,0.06);
  }

  /* ── Footer ── */
  .card-footer {
    margin-top: 20px;
    text-align: center;
    font-size: 12px;
    color: #475569;
    border-top: 1px solid rgba(255,255,255,0.05);
    padding-top: 18px;
  }
  .card-footer a { color: #8b5cf6; text-decoration: none; font-weight: 600; cursor: pointer; }
  .card-footer a:hover { color: #a78bfa; }



  /* ── Eye toggle ── */
  .eye-btn {
    position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
    background: transparent; border: none; cursor: pointer; color: #475569;
    font-size: 14px; padding: 0; display: flex; align-items: center;
    transition: color 150ms;
  }
  .eye-btn:hover { color: #8b5cf6; }

  @media (max-width: 480px) {
    .card { padding: 28px 22px 24px; }
    .logo-img { width: 100px; height: 100px; }
  }
</style>
</head>
<body>

<div class="bg-glow"></div>
<div class="bg-grid"></div>

<div class="card">

  <!-- Logo -->
  <div class="logo-wrap">
    <img src="assets/logo-nobg.png" class="logo-img" alt="KRAXIUM BOT">
  </div>

  <!-- Heading -->
  <div class="heading">Bem-vindo de volta</div>
  <div class="sub">Acesse sua conta KRAXIUM BOT</div>

  <div class="divider"></div>

  <!-- Form -->
  <form onsubmit="handleLogin(event)">

    <div class="field">
      <label class="field-label">E-mail</label>
      <div class="input-wrap">
        <span class="input-icon">✉</span>
        <input type="email" id="email" placeholder="seu@email.com" autocomplete="email">
      </div>
    </div>

    <div class="field">
      <label class="field-label">Senha</label>
      <div class="input-wrap">
        <span class="input-icon">◉</span>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
        <button type="button" class="eye-btn" onclick="togglePwd(this)" aria-label="Mostrar senha">👁</button>
      </div>
    </div>

    <div class="field-row">
      <label class="remember">
        <input type="checkbox" checked>
        Lembrar-me
      </label>
      <a class="forgot" href="#">Esqueci a senha</a>
    </div>

    <button type="submit" class="btn-login" id="loginBtn">
      Entrar na Plataforma
    </button>

    <div class="or-sep">ou continue com</div>

    <button type="button" class="btn-google">
      <svg width="16" height="16" viewBox="0 0 48 48" style="flex-shrink:0">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.36-8.16 2.36-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
      </svg>
      Entrar com Google
    </button>

  </form>

  <!-- Footer -->
  <div class="card-footer">
    Não tem conta? <a href="#">Criar conta grátis</a>
  </div>

</div>

<script>
  function togglePwd(btn) {
    const inp = btn.closest('.input-wrap').querySelector('input');
    inp.type = inp.type === 'password' ? 'text' : 'password';
    btn.textContent = inp.type === 'password' ? '👁' : '🙈';
  }

  function handleLogin(e) {
    e.preventDefault();
    const btn = document.getElementById('loginBtn');
    btn.textContent = '⟳ Autenticando...';
    btn.style.opacity = '0.8';
    btn.disabled = true;
    setTimeout(() => {
      btn.textContent = '✓ Acesso liberado';
      btn.style.background = 'linear-gradient(135deg,#10b981,#00ff88)';
      btn.style.boxShadow = '0 4px 20px rgba(0,255,136,0.35)';
      setTimeout(() => {
        btn.textContent = 'Entrar na Plataforma';
        btn.style.background = 'linear-gradient(135deg,#8b5cf6,#6d28d9)';
        btn.style.boxShadow = '0 4px 20px rgba(139,92,246,0.35)';
        btn.style.opacity = '1';
        btn.disabled = false;
      }, 2000);
    }, 1400);
  }
</script>

</body>
</html>
